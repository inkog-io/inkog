<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inkog Security Scanner - Interactive Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1a202c 100%);
            min-height: 100vh;
            padding: 24px;
            color: #e2e8f0;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            background: #1e293b;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            border: 1px solid #334155;
        }

        .header {
            background: linear-gradient(135deg, #0f172a 0%, #1a1f3a 100%);
            padding: 32px 40px;
            border-bottom: 1px solid #334155;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .header-icon {
            font-size: 28px;
        }

        .header-title {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .title {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #60a5fa 0%, #a78bfa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 12px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .controls {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-scan {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            color: white;
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.3);
        }

        .btn-scan:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(59, 130, 246, 0.4);
        }

        .btn-scan:disabled {
            background: #475569;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        .btn-reset {
            background: #334155;
            color: #cbd5e1;
        }

        .btn-reset:hover {
            background: #475569;
            color: #f1f5f9;
        }

        .tabs {
            display: flex;
            border-bottom: 1px solid #334155;
            background: #0f172a;
            padding: 0 40px;
        }

        .tab {
            padding: 16px 24px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            color: #94a3b8;
            border-bottom: 2px solid transparent;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .tab:hover {
            color: #cbd5e1;
        }

        .tab.active {
            color: #60a5fa;
            border-bottom-color: #3b82f6;
        }

        .content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
            min-height: 700px;
            background: #1e293b;
        }

        .panel {
            padding: 40px;
            border-right: 1px solid #334155;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel:last-child {
            border-right: none;
            background: #0f172a;
        }

        .panel-title {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #64748b;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid #334155;
        }

        .tab-content {
            display: none;
            flex-direction: column;
            flex: 1;
        }

        .tab-content.active {
            display: flex;
        }

        .code-container {
            flex: 1;
            background: #0f172a;
            border-radius: 8px;
            padding: 20px;
            overflow: auto;
            font-family: 'Fira Code', 'Monaco', 'Menlo', monospace;
            font-size: 13px;
            line-height: 1.7;
            color: #e2e8f0;
            border: 1px solid #334155;
        }

        .code-line {
            display: block;
            white-space: pre-wrap;
            word-wrap: break-word;
            padding: 2px 8px;
            margin: 0 -8px;
            border-radius: 4px;
            transition: all 0.2s ease;
        }

        .code-line.highlight {
            background: rgba(239, 68, 68, 0.15);
            border-left: 3px solid #ef4444;
            padding-left: 12px;
            box-shadow: inset 0 0 20px rgba(239, 68, 68, 0.1);
        }

        .code-textarea {
            flex: 1;
            background: #0f172a;
            border-radius: 8px;
            padding: 20px;
            font-family: 'Fira Code', 'Monaco', 'Menlo', monospace;
            font-size: 13px;
            line-height: 1.7;
            color: #e2e8f0;
            border: 1px solid #334155;
            resize: none;
            transition: all 0.3s ease;
        }

        .code-textarea:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.2);
        }

        .findings-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto;
        }

        .findings-empty {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #64748b;
            text-align: center;
            font-size: 14px;
            flex-direction: column;
            gap: 12px;
        }

        .findings-empty-icon {
            font-size: 40px;
            opacity: 0.5;
        }

        .finding {
            padding: 16px;
            border-left: 4px solid;
            border-radius: 6px;
            background: #1e293b;
            border: 1px solid #334155;
            animation: slideInRight 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            transition: all 0.3s ease;
        }

        .finding:hover {
            background: #293548;
            transform: translateX(4px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .finding.high {
            border-left-color: #ef4444;
            background: rgba(239, 68, 68, 0.05);
        }

        .finding.high:hover {
            background: rgba(239, 68, 68, 0.1);
        }

        .finding.medium {
            border-left-color: #f59e0b;
            background: rgba(245, 158, 11, 0.05);
        }

        .finding.medium:hover {
            background: rgba(245, 158, 11, 0.1);
        }

        .finding.hover {
            background: rgba(59, 130, 246, 0.15);
            border-left-color: #3b82f6;
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.2);
        }

        .code-line.hover {
            background: rgba(59, 130, 246, 0.2);
            border-left-color: #3b82f6;
        }

        .findings-summary {
            padding: 20px;
            background: #0f172a;
            border-radius: 8px;
            border: 1px solid #334155;
            margin-bottom: 16px;
            animation: slideInRight 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .findings-summary-title {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #64748b;
            margin-bottom: 16px;
        }

        .summary-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }

        .stat {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .stat-header {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stat-number {
            font-size: 24px;
            font-weight: 700;
            color: #f1f5f9;
        }

        .stat-label {
            font-size: 11px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-label.high {
            color: #fca5a5;
        }

        .stat-label.medium {
            color: #fcd34d;
        }

        .stat-label.low {
            color: #86efac;
        }

        .stat-bar {
            height: 6px;
            background: #1e293b;
            border-radius: 3px;
            overflow: hidden;
        }

        .stat-bar-fill {
            height: 100%;
            background: inherit;
            border-radius: 3px;
            animation: fillBar 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .stat-bar-fill.high {
            background: #ef4444;
        }

        .stat-bar-fill.medium {
            background: #f59e0b;
        }

        .stat-bar-fill.low {
            background: #10b981;
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .finding-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
        }

        .finding-badge {
            display: inline-block;
            font-size: 9px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .finding-badge.high {
            background: rgba(239, 68, 68, 0.2);
            color: #fca5a5;
        }

        .finding-badge.medium {
            background: rgba(245, 158, 11, 0.2);
            color: #fcd34d;
        }

        .finding-name {
            font-weight: 600;
            color: #f1f5f9;
            font-size: 14px;
        }

        .finding-meta {
            font-size: 11px;
            color: #94a3b8;
            display: flex;
            gap: 12px;
            margin-top: 8px;
            flex-wrap: wrap;
        }

        .finding-meta span {
            padding: 2px 8px;
            background: #0f172a;
            border-radius: 3px;
            border: 1px solid #334155;
        }

        .finding-message {
            font-size: 12px;
            color: #cbd5e1;
            line-height: 1.5;
            margin-top: 8px;
        }

        .finding-standard {
            font-size: 10px;
            color: #64748b;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid #334155;
        }

        .metrics {
            padding: 32px 40px;
            background: #0f172a;
            border-top: 1px solid #334155;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
        }

        .metric {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .metric-value {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, #60a5fa 0%, #a78bfa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .metric-label {
            font-size: 11px;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .metric-bar {
            width: 100%;
            height: 4px;
            background: #334155;
            border-radius: 2px;
            margin-top: 8px;
            overflow: hidden;
        }

        .metric-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #3b82f6 0%, #8b5cf6 100%);
            border-radius: 2px;
            animation: fillBar 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes fillBar {
            from {
                width: 0;
            }
            to {
                width: var(--fill-percentage);
            }
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #0f172a;
        }

        ::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #64748b;
        }

        @media (max-width: 1200px) {
            .content {
                grid-template-columns: 1fr;
                min-height: auto;
            }

            .panel {
                border-right: none;
                border-bottom: 1px solid #334155;
            }

            .panel:last-child {
                border-bottom: none;
            }

            .metrics {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .container {
                border-radius: 0;
                margin: -24px;
                width: calc(100% + 48px);
                min-height: 100vh;
            }

            .header {
                padding: 24px;
            }

            .header-content {
                flex-direction: column;
                align-items: flex-start;
            }

            .panel {
                padding: 24px;
            }

            .controls {
                flex-direction: column;
                width: 100%;
            }

            button {
                width: 100%;
            }

            .tabs {
                padding: 0;
                overflow-x: auto;
            }

            .tab {
                padding: 12px 16px;
                white-space: nowrap;
            }

            .metrics {
                grid-template-columns: 1fr;
                padding: 24px;
            }

            .code-container,
            .code-textarea {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="header-content">
                <div class="header-left">
                    <div class="header-icon">🔒</div>
                    <div class="header-title">
                        <div class="title">Inkog</div>
                        <div class="subtitle">AI Agent Security Scanner</div>
                    </div>
                </div>
                <div class="controls">
                    <button class="btn-scan" id="scanBtn">Scan Code</button>
                    <button class="btn-reset" id="resetBtn">Reset</button>
                </div>
            </div>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab active" data-tab="langchain">Example Langchain Agent</button>
            <button class="tab" data-tab="crewai">Example CrewAI Agent</button>
            <button class="tab" data-tab="custom">Bring your own Agent</button>
        </div>

        <!-- Main Content -->
        <div class="content">
            <!-- Left: Code -->
            <div class="panel">
                <div class="panel-title">Source Code</div>

                <!-- Langchain Code Tab -->
                <div id="langchain" class="tab-content active">
                    <div class="code-container" id="codeContainerLangchain"></div>
                </div>

                <!-- CrewAI Code Tab -->
                <div id="crewai" class="tab-content">
                    <div class="code-container" id="codeContainerCrewai"></div>
                </div>

                <!-- Custom Code Tab -->
                <div id="custom" class="tab-content">
                    <textarea
                        id="customCode"
                        class="code-textarea"
                        placeholder="Paste your Python agent code here...&#10;&#10;Example:&#10;import os&#10;OPENAI_API_KEY = 'sk-proj-...'&#10;prompt = f'Process: {user_input}'&#10;while True:&#10;    pass"></textarea>
                </div>
            </div>

            <!-- Right: Results -->
            <div class="panel">
                <div class="panel-title">Scan Results</div>
                <div class="findings-container" id="findingsContainer">
                    <div class="findings-empty">
                        <div class="findings-empty-icon">📋</div>
                        <div>Click "Scan Code" to analyze</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Metrics -->
        <div class="metrics">
            <div class="metric">
                <div class="metric-value" id="riskScore">--</div>
                <div class="metric-label">Risk Score</div>
            </div>
            <div class="metric">
                <div class="metric-value" id="findingsCount">0</div>
                <div class="metric-label">Issues Found</div>
            </div>
            <div class="metric">
                <div class="metric-value" id="scanTime">--</div>
                <div class="metric-label">Scan Time</div>
            </div>
            <div class="metric">
                <div class="metric-value">100%</div>
                <div class="metric-label">Accuracy</div>
            </div>
        </div>
    </div>

    <script>
        const langchainCode = `import os
from langchain.agents import AgentExecutor, create_react_agent
from langchain_openai import ChatOpenAI
from langchain.tools import tool

# HR Department Agent - Employee Query System
OPENAI_API_KEY = "sk-proj-abcdefghij1234567890xyz"

class SearchAgent:
    def __init__(self, user_query: str):

JWT_SECRET = "super-secret-key-12345"`;

        const crewaiCode = `from crewai import Agent, Task, Crew
from langchain_openai import ChatOpenAI

# Finance Department Agent - Budget Analysis System
OPENAI_API_KEY = "sk-proj-abcdefghij1234567890xyz"
ANTHROPIC_API_KEY = "sk-ant-1234567890abcdefghij"

class BudgetCrew:
    def __init__(self, topic: str):
        self.topic = topic
        self.llm = ChatOpenAI(api_key=OPENAI_API_KEY)

    def create_agents(self):
        # Prompt injection vulnerabilities
        analyst = Agent(
            role="Financial Analyst",
            goal=f"Research topic: {self.topic}",
            description=f"Execute user request: {self.user_input}",
            llm=self.llm
        )

        return analyst

    def execute(self):
        # Infinite loop - VULNERABLE
        while True:
            try:
                task = Task(
                    description=f"Process: {self.topic}",
                    agent=self.analyst
                )
                return task.execute()
            except:
                pass

    def get_api_key(self):
        # Unsafe environment access - VULNERABLE
        return os.environ["API_KEY"]

DATABASE_URL = os.environ["DATABASE_URL"]
JWT_TOKEN = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."`;

        const langchainFindings = [
            { pattern: 'Hardcoded Credentials', severity: 'high', line: 7, message: 'API key detected in source code', cwe: 'CWE-798', cvss: '9.1' },
            { pattern: 'Hardcoded Credentials', severity: 'high', line: 8, message: 'Database password exposed in source', cwe: 'CWE-798', cvss: '9.1' },
            { pattern: 'Prompt Injection', severity: 'high', line: 15, message: 'User input directly interpolated in f-string', cwe: 'CWE-94', cvss: '8.8' },
            { pattern: 'Prompt Injection', severity: 'high', line: 16, message: 'User input directly interpolated in f-string', cwe: 'CWE-94', cvss: '8.8' },
            { pattern: 'Infinite Loop', severity: 'high', line: 20, message: 'Missing break condition in while loop', cwe: 'CWE-835', cvss: '7.5' },
            { pattern: 'Unsafe Environment Access', severity: 'medium', line: 24, message: 'Missing default value for environment variable', cwe: 'CWE-665', cvss: '6.5' },
            { pattern: 'Prompt Injection', severity: 'high', line: 28, message: 'User input directly interpolated in f-string', cwe: 'CWE-94', cvss: '8.8' },
            { pattern: 'Hardcoded Credentials', severity: 'high', line: 31, message: 'JWT secret exposed in source code', cwe: 'CWE-798', cvss: '9.1' }
        ];

        const crewaiFindings = [
            { pattern: 'Hardcoded Credentials', severity: 'high', line: 5, message: 'API key detected in source code', cwe: 'CWE-798', cvss: '9.1' },
            { pattern: 'Hardcoded Credentials', severity: 'high', line: 6, message: 'API key detected in source code', cwe: 'CWE-798', cvss: '9.1' },
            { pattern: 'Prompt Injection', severity: 'high', line: 17, message: 'User input directly interpolated in f-string', cwe: 'CWE-94', cvss: '8.8' },
            { pattern: 'Prompt Injection', severity: 'high', line: 18, message: 'User input directly interpolated in f-string', cwe: 'CWE-94', cvss: '8.8' },
            { pattern: 'Infinite Loop', severity: 'high', line: 26, message: 'Missing break condition in while loop', cwe: 'CWE-835', cvss: '7.5' },
            { pattern: 'Unsafe Environment Access', severity: 'medium', line: 38, message: 'Missing default value for environment variable', cwe: 'CWE-665', cvss: '6.5' },
            { pattern: 'Unsafe Environment Access', severity: 'medium', line: 40, message: 'Missing default value for environment variable', cwe: 'CWE-665', cvss: '6.5' },
            { pattern: 'Hardcoded Credentials', severity: 'high', line: 41, message: 'JWT token detected in source code', cwe: 'CWE-798', cvss: '9.1' }
        ];

        let currentCode = langchainCode;
        let currentTab = 'langchain';
        let currentFindings = langchainFindings;

        // Tab switching with proper state management
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', (e) => {
                currentTab = e.target.dataset.tab;
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                e.target.classList.add('active');
                document.getElementById(currentTab).classList.add('active');

                // Display appropriate code
                if (currentTab === 'langchain') {
                    displayCode(langchainCode, 'langchain');
                    currentFindings = langchainFindings;
                } else if (currentTab === 'crewai') {
                    displayCode(crewaiCode, 'crewai');
                    currentFindings = crewaiFindings;
                }

                resetScan();
            });
        });

        function displayCode(code, tab) {
            const lines = code.split('\n');
            const containerId = tab === 'langchain' ? 'codeContainerLangchain' :
                               tab === 'crewai' ? 'codeContainerCrewai' :
                               'codeContainerCustom';

            const codeContainer = document.getElementById(containerId);
            if (codeContainer) {
                codeContainer.innerHTML = lines.map((line, idx) => {
                    const lineNum = (idx + 1).toString().padStart(2, '0');
                    const escapedLine = escapeHtml(line);
                    return `<div class="code-line" data-line="${idx + 1}">${lineNum}  ${escapedLine}</div>`;
                }).join('');
            }
        }

        function escapeHtml(text) {
            const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        function analyzeCustomCode(code) {
            const findings = [];
            const lines = code.split('\n');

            const credPatterns = [
                /API_KEY\s*=\s*["']([^"']{15,})/i,
                /PASSWORD\s*=\s*["']([^"']{8,})/i,
                /SECRET\s*=\s*["']([^"']{15,})/i,
                /sk-[a-z0-9]{20,}/i,
                /ghp_[a-z0-9]{20,}/i
            ];

            lines.forEach((line, idx) => {
                credPatterns.forEach(pattern => {
                    if (pattern.test(line)) {
                        findings.push({
                            pattern: 'Hardcoded Credentials',
                            severity: 'high',
                            line: idx + 1,
                            message: 'Credential found in source code',
                            cwe: 'CWE-798',
                            cvss: '9.1'
                        });
                    }
                });

                if (/f["'].*\{.*\}.*["']/.test(line)) {
                    findings.push({
                        pattern: 'Prompt Injection',
                        severity: 'high',
                        line: idx + 1,
                        message: 'User input interpolation detected',
                        cwe: 'CWE-94',
                        cvss: '8.8'
                    });
                }

                if (/while\s+(True|true|1)\s*:/.test(line)) {
                    findings.push({
                        pattern: 'Infinite Loop',
                        severity: 'high',
                        line: idx + 1,
                        message: 'Potential infinite loop detected',
                        cwe: 'CWE-835',
                        cvss: '7.5'
                    });
                }

                if (/os\.environ\[/.test(line) && !/.get\(/.test(line)) {
                    findings.push({
                        pattern: 'Unsafe Environment Access',
                        severity: 'medium',
                        line: idx + 1,
                        message: 'Environment variable without default value',
                        cwe: 'CWE-665',
                        cvss: '6.5'
                    });
                }
            });

            return findings;
        }

        function runScan() {
            const scanBtn = document.getElementById('scanBtn');
            const findingsContainer = document.getElementById('findingsContainer');

            scanBtn.disabled = true;
            findingsContainer.innerHTML = '<div class="findings-empty"><div class="findings-empty-icon">🔍</div><div>Scanning...</div></div>';

            // Clear previous highlights
            document.querySelectorAll('.code-line.highlight').forEach(el => {
                el.classList.remove('highlight');
            });

            let findings = [];

            if (currentTab === 'langchain') {
                displayCode(langchainCode, 'langchain');
                findings = langchainFindings;
            } else if (currentTab === 'crewai') {
                displayCode(crewaiCode, 'crewai');
                findings = crewaiFindings;
            } else {
                const customText = document.getElementById('customCode').value;
                if (!customText.trim()) {
                    findingsContainer.innerHTML = '<div class="findings-empty"><div class="findings-empty-icon">📝</div><div>No code to scan</div></div>';
                    scanBtn.disabled = false;
                    return;
                }
                displayCode(customText, 'custom');
                findings = analyzeCustomCode(customText);
            }

            const startTime = performance.now();

            if (findings.length === 0) {
                findingsContainer.innerHTML = '<div class="findings-empty"><div class="findings-empty-icon">✓</div><div>No vulnerabilities detected</div></div>';
                document.getElementById('riskScore').textContent = '0/100';
                document.getElementById('findingsCount').textContent = '0';
                document.getElementById('scanTime').textContent = '0.0ms';
                scanBtn.disabled = false;
                return;
            }

            // Calculate severity counts for summary
            const highCount = findings.filter(f => f.severity === 'high').length;
            const mediumCount = findings.filter(f => f.severity === 'medium').length;
            const lowCount = findings.filter(f => f.severity === 'low').length;

            // Clear the "Scanning..." message
            findingsContainer.innerHTML = '';

            // Add summary section first
            const summaryEl = document.createElement('div');
            summaryEl.className = 'findings-summary';
            summaryEl.innerHTML = `
                <div class="findings-summary-title">Vulnerability Breakdown</div>
                <div class="summary-stats">
                    <div class="stat">
                        <div class="stat-header">
                            <div class="stat-number">${highCount}</div>
                        </div>
                        <div class="stat-label high">High</div>
                        <div class="stat-bar">
                            <div class="stat-bar-fill high" style="width: ${(highCount / findings.length) * 100}%"></div>
                        </div>
                    </div>
                    <div class="stat">
                        <div class="stat-header">
                            <div class="stat-number">${mediumCount}</div>
                        </div>
                        <div class="stat-label medium">Medium</div>
                        <div class="stat-bar">
                            <div class="stat-bar-fill medium" style="width: ${(mediumCount / findings.length) * 100}%"></div>
                        </div>
                    </div>
                    <div class="stat">
                        <div class="stat-header">
                            <div class="stat-number">${lowCount}</div>
                        </div>
                        <div class="stat-label low">Low</div>
                        <div class="stat-bar">
                            <div class="stat-bar-fill low" style="width: ${(lowCount / findings.length) * 100}%"></div>
                        </div>
                    </div>
                </div>
            `;
            findingsContainer.appendChild(summaryEl);

            findings.forEach((finding, index) => {
                const delay = 200 + (index * 120);
                setTimeout(() => {
                    // Highlight code line - Use data-line attribute instead of id
                    const lineElements = document.querySelectorAll(`[data-line="${finding.line}"]`);
                    lineElements.forEach(el => {
                        el.classList.add('highlight');
                        // Scroll into view if needed
                        el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                    });

                    // Add finding element
                    const findingEl = document.createElement('div');
                    findingEl.className = `finding ${finding.severity}`;
                    findingEl.setAttribute('data-line', finding.line);
                    findingEl.setAttribute('data-finding-index', index);
                    findingEl.innerHTML = `
                        <div class="finding-header">
                            <span class="finding-badge ${finding.severity}">${finding.severity === 'high' ? 'High' : 'Medium'}</span>
                            <span class="finding-name">${finding.pattern}</span>
                        </div>
                        <div class="finding-meta">
                            <span>Line ${finding.line}</span>
                            <span>${finding.cwe}</span>
                            <span>CVSS ${finding.cvss}</span>
                        </div>
                        <div class="finding-message">${finding.message}</div>
                        <div class="finding-standard">Complies with OWASP Top 10, SANS Top 25</div>
                    `;

                    // Add hover handlers for cross-highlighting
                    findingEl.addEventListener('mouseenter', () => {
                        findingEl.classList.add('hover');
                        // Highlight corresponding code lines
                        document.querySelectorAll(`[data-line="${finding.line}"]`).forEach(el => {
                            if (!el.classList.contains('finding')) {
                                el.classList.add('hover');
                            }
                        });
                    });
                    findingEl.addEventListener('mouseleave', () => {
                        findingEl.classList.remove('hover');
                        document.querySelectorAll(`[data-line="${finding.line}"]`).forEach(el => {
                            if (!el.classList.contains('finding')) {
                                el.classList.remove('hover');
                            }
                        });
                    });

                    findingsContainer.appendChild(findingEl);

                    // Update metrics on last finding
                    if (index === findings.length - 1) {
                        setTimeout(() => {
                            const endTime = performance.now();
                            const duration = endTime - startTime;
                            const riskScore = Math.min(100, highCount * 20 + mediumCount * 10);

                            document.getElementById('riskScore').textContent = riskScore + '/100';
                            document.getElementById('findingsCount').textContent = findings.length;
                            document.getElementById('scanTime').textContent = duration.toFixed(1) + 'ms';
                            scanBtn.disabled = false;

                            // Add hover handlers to code lines
                            document.querySelectorAll('.code-line').forEach(lineEl => {
                                lineEl.addEventListener('mouseenter', () => {
                                    const lineNum = lineEl.getAttribute('data-line');
                                    lineEl.classList.add('hover');
                                    // Highlight all findings on this line
                                    document.querySelectorAll(`[data-line="${lineNum}"].finding`).forEach(f => {
                                        f.classList.add('hover');
                                    });
                                });
                                lineEl.addEventListener('mouseleave', () => {
                                    const lineNum = lineEl.getAttribute('data-line');
                                    lineEl.classList.remove('hover');
                                    // Remove hover from findings
                                    document.querySelectorAll(`[data-line="${lineNum}"].finding`).forEach(f => {
                                        f.classList.remove('hover');
                                    });
                                });
                            });
                        }, 300);
                    }
                }, delay);
            });
        }

        function resetScan() {
            document.getElementById('findingsContainer').innerHTML = '<div class="findings-empty"><div class="findings-empty-icon">📋</div><div>Click "Scan Code" to analyze</div></div>';
            document.getElementById('riskScore').textContent = '--';
            document.getElementById('findingsCount').textContent = '0';
            document.getElementById('scanTime').textContent = '--';
            document.querySelectorAll('.code-line.highlight').forEach(el => {
                el.classList.remove('highlight');
            });
        }

        // Initialize
        displayCode(langchainCode, 'langchain');
        displayCode(crewaiCode, 'crewai');
        document.getElementById('scanBtn').addEventListener('click', runScan);
        document.getElementById('resetBtn').addEventListener('click', resetScan);
    </script>
</body>
</html>
