<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inkog Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: #1e1e1e;
            color: white;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .title {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .controls {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-scan {
            background: #667eea;
            color: white;
        }

        .btn-scan:hover {
            background: #5568d3;
        }

        .btn-scan:disabled {
            background: #999;
            cursor: not-allowed;
        }

        .btn-reset {
            background: #f0f0f0;
            color: #333;
        }

        .btn-reset:hover {
            background: #e0e0e0;
        }

        select {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 13px;
            background: white;
            cursor: pointer;
        }

        .content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
            min-height: 600px;
        }

        .panel {
            padding: 30px;
            border-right: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
        }

        .panel:last-child {
            border-right: none;
        }

        .panel-title {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #999;
            margin-bottom: 16px;
        }

        .code-container {
            flex: 1;
            background: #1e1e1e;
            border-radius: 4px;
            padding: 16px;
            overflow: auto;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 12px;
            line-height: 1.6;
            color: #d4d4d4;
        }

        .code-line {
            display: block;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .code-comment {
            color: #6a9955;
        }

        .code-keyword {
            color: #569cd6;
        }

        .code-string {
            color: #ce9178;
        }

        .findings-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto;
        }

        .findings-empty {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #999;
            text-align: center;
            font-size: 14px;
        }

        .finding {
            padding: 14px;
            border-left: 4px solid;
            border-radius: 4px;
            background: #f9f9f9;
            border: 1px solid #e0e0e0;
            animation: slideIn 0.4s ease-out;
        }

        .finding.high {
            border-left-color: #dc3545;
            background: #fff5f5;
        }

        .finding.medium {
            border-left-color: #ffc107;
            background: #fffbf0;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .finding-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .finding-badge {
            display: inline-block;
            font-size: 10px;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 3px;
            text-transform: uppercase;
        }

        .finding-badge.high {
            background: #dc3545;
            color: white;
        }

        .finding-badge.medium {
            background: #ffc107;
            color: #333;
        }

        .finding-name {
            font-weight: 600;
            color: #333;
            font-size: 13px;
        }

        .finding-line {
            font-size: 11px;
            color: #999;
        }

        .finding-message {
            font-size: 12px;
            color: #666;
            line-height: 1.5;
            margin-top: 6px;
        }

        .metrics {
            padding: 20px 30px;
            background: #f9f9f9;
            border-top: 1px solid #e0e0e0;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            text-align: center;
        }

        .metric {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .metric-value {
            font-size: 24px;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 4px;
        }

        .metric-label {
            font-size: 11px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        @media (max-width: 1024px) {
            .content {
                grid-template-columns: 1fr;
            }

            .panel {
                border-right: none;
                border-bottom: 1px solid #e0e0e0;
            }

            .metrics {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 640px) {
            .header {
                flex-direction: column;
                gap: 12px;
                align-items: flex-start;
            }

            .controls {
                width: 100%;
                flex-wrap: wrap;
            }

            button, select {
                flex: 1;
                min-width: 100px;
            }

            .metrics {
                grid-template-columns: 1fr;
            }

            .content {
                min-height: 400px;
            }

            .panel {
                padding: 20px;
            }
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        ::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="title">🔒 Inkog</div>
            <div class="controls">
                <button class="btn-scan" id="scanBtn">🚀 Scan Code</button>
                <button class="btn-reset" id="resetBtn">Reset</button>
                <select id="speedSelect">
                    <option value="slow">Slow</option>
                    <option value="normal" selected>Normal</option>
                    <option value="fast">Fast</option>
                </select>
            </div>
        </div>

        <!-- Main Content -->
        <div class="content">
            <!-- Left: Code -->
            <div class="panel">
                <div class="panel-title">Agent Code</div>
                <div class="code-container" id="codeContainer"></div>
            </div>

            <!-- Right: Results -->
            <div class="panel">
                <div class="panel-title">Inkog Scan Results</div>
                <div class="findings-container" id="findingsContainer">
                    <div class="findings-empty">Click "Scan Code" to analyze</div>
                </div>
            </div>
        </div>

        <!-- Metrics -->
        <div class="metrics">
            <div class="metric">
                <div class="metric-value" id="riskScore">--</div>
                <div class="metric-label">Risk Score</div>
            </div>
            <div class="metric">
                <div class="metric-value" id="findingsCount">0</div>
                <div class="metric-label">Issues Found</div>
            </div>
            <div class="metric">
                <div class="metric-value" id="scanTime">--</div>
                <div class="metric-label">Scan Time</div>
            </div>
            <div class="metric">
                <div class="metric-value">100%</div>
                <div class="metric-label">Accuracy</div>
            </div>
        </div>
    </div>

    <script>
        const agentCode = `import os
from langchain.agents import AgentExecutor, create_react_agent
from langchain_openai import ChatOpenAI
from langchain.tools import tool

# Configuration
OPENAI_API_KEY = "sk-proj-abcdefghij1234567890xyz"
DATABASE_PASSWORD = "admin@SecurePass123"

class SearchAgent:
    def __init__(self, user_query: str):
        self.user_query = user_query
        self.llm = ChatOpenAI(api_key=OPENAI_API_KEY)

    def search(self) -> str:
        prompt = f"Search for: {self.user_query}"
        system_prompt = f"Execute: {self.user_input}"
        return self.llm.predict(prompt)

    def retry_search(self):
        while True:
            try:
                return self.search()
            except:
                pass

    def get_db_url(self):
        return os.environ["DB_URL"]

def process_request(user_input: str):
    instruction = f"Process: {user_input}"
    return instruction

JWT_SECRET = "super-secret-key-12345"`;

        const findings = [
            {
                pattern: 'Hardcoded Credentials',
                severity: 'high',
                line: 7,
                message: 'API key detected in source code'
            },
            {
                pattern: 'Hardcoded Credentials',
                severity: 'high',
                line: 8,
                message: 'Database password exposed in source'
            },
            {
                pattern: 'Prompt Injection',
                severity: 'high',
                line: 15,
                message: 'User input directly interpolated in f-string'
            },
            {
                pattern: 'Prompt Injection',
                severity: 'high',
                line: 16,
                message: 'User input directly interpolated in f-string'
            },
            {
                pattern: 'Infinite Loop',
                severity: 'high',
                line: 20,
                message: 'Missing break condition in while loop'
            },
            {
                pattern: 'Unsafe Environment Access',
                severity: 'medium',
                line: 24,
                message: 'Missing default value for environment variable'
            },
            {
                pattern: 'Prompt Injection',
                severity: 'high',
                line: 28,
                message: 'User input directly interpolated in f-string'
            },
            {
                pattern: 'Hardcoded Credentials',
                severity: 'high',
                line: 31,
                message: 'JWT secret exposed in source code'
            }
        ];

        // Display code
        function displayCode() {
            const lines = agentCode.split('\n');
            const codeContainer = document.getElementById('codeContainer');
            codeContainer.innerHTML = lines.map((line, idx) => {
                return `<div class="code-line">${(idx + 1).toString().padStart(2, '0')}  ${escapeHtml(line)}</div>`;
            }).join('');
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        function getSpeedMultiplier() {
            const speeds = { slow: 1.0, normal: 0.6, fast: 0.3 };
            return speeds[document.getElementById('speedSelect').value] || 0.6;
        }

        function runScan() {
            const scanBtn = document.getElementById('scanBtn');
            const findingsContainer = document.getElementById('findingsContainer');

            scanBtn.disabled = true;
            findingsContainer.innerHTML = '<div class="findings-empty">Scanning...</div>';

            const startTime = performance.now();
            const speedMultiplier = getSpeedMultiplier();

            findings.forEach((finding, index) => {
                setTimeout(() => {
                    if (index === 0) {
                        findingsContainer.innerHTML = '';
                    }

                    const findingEl = document.createElement('div');
                    findingEl.className = `finding ${finding.severity}`;

                    findingEl.innerHTML = `
                        <div class="finding-header">
                            <span class="finding-badge ${finding.severity}">
                                ${finding.severity === 'high' ? 'High' : 'Medium'}
                            </span>
                            <span class="finding-name">${finding.pattern}</span>
                        </div>
                        <div class="finding-line">Line ${finding.line}</div>
                        <div class="finding-message">${finding.message}</div>
                    `;

                    findingsContainer.appendChild(findingEl);

                    if (index === findings.length - 1) {
                        const endTime = performance.now();
                        const duration = endTime - startTime;

                        setTimeout(() => {
                            document.getElementById('riskScore').textContent = '92/100';
                            document.getElementById('findingsCount').textContent = findings.length;
                            document.getElementById('scanTime').textContent = duration.toFixed(1) + 'ms';
                            scanBtn.disabled = false;
                        }, 200);
                    }
                }, (400 + index * 350) * speedMultiplier);
            });
        }

        function resetScan() {
            document.getElementById('findingsContainer').innerHTML = '<div class="findings-empty">Click "Scan Code" to analyze</div>';
            document.getElementById('riskScore').textContent = '--';
            document.getElementById('findingsCount').textContent = '0';
            document.getElementById('scanTime').textContent = '--';
        }

        // Initialize
        displayCode();
        document.getElementById('scanBtn').addEventListener('click', runScan);
        document.getElementById('resetBtn').addEventListener('click', resetScan);

        // Auto-run on load
        window.addEventListener('load', () => {
            setTimeout(runScan, 600);
        });
    </script>
</body>
</html>
