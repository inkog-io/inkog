<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inkog Security Scanner Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: #1e1e1e;
            color: white;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .title {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .controls {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-scan {
            background: #667eea;
            color: white;
        }

        .btn-scan:hover {
            background: #5568d3;
        }

        .btn-scan:disabled {
            background: #999;
            cursor: not-allowed;
        }

        .btn-reset {
            background: #f0f0f0;
            color: #333;
        }

        .btn-reset:hover {
            background: #e0e0e0;
        }

        select {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 13px;
            background: white;
            cursor: pointer;
        }

        .tabs {
            display: flex;
            border-bottom: 1px solid #e0e0e0;
            background: #f9f9f9;
        }

        .tab {
            padding: 12px 24px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            color: #666;
            border-bottom: 2px solid transparent;
            transition: all 0.3s ease;
        }

        .tab:hover {
            color: #333;
        }

        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
            min-height: 600px;
        }

        .panel {
            padding: 30px;
            border-right: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
        }

        .panel:last-child {
            border-right: none;
        }

        .panel-title {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #999;
            margin-bottom: 16px;
        }

        .code-container {
            flex: 1;
            background: #1e1e1e;
            border-radius: 4px;
            padding: 16px;
            overflow: auto;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 12px;
            line-height: 1.6;
            color: #d4d4d4;
        }

        .code-line {
            display: block;
            white-space: pre-wrap;
            word-wrap: break-word;
            padding: 2px 4px;
            margin: 0 -4px;
            border-radius: 2px;
            transition: all 0.3s ease;
        }

        .code-line.highlight {
            background: rgba(220, 53, 69, 0.3);
            border-left: 3px solid #dc3545;
            padding-left: 8px;
        }

        .code-textarea {
            flex: 1;
            background: #1e1e1e;
            border-radius: 4px;
            padding: 16px;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 12px;
            line-height: 1.6;
            color: #d4d4d4;
            border: 1px solid #333;
            resize: none;
        }

        .findings-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto;
        }

        .findings-empty {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #999;
            text-align: center;
            font-size: 14px;
        }

        .finding {
            padding: 14px;
            border-left: 4px solid;
            border-radius: 4px;
            background: #f9f9f9;
            border: 1px solid #e0e0e0;
            animation: slideIn 0.4s ease-out;
        }

        .finding.high {
            border-left-color: #dc3545;
            background: #fff5f5;
        }

        .finding.medium {
            border-left-color: #ffc107;
            background: #fffbf0;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .finding-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .finding-badge {
            display: inline-block;
            font-size: 10px;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 3px;
            text-transform: uppercase;
        }

        .finding-badge.high {
            background: #dc3545;
            color: white;
        }

        .finding-badge.medium {
            background: #ffc107;
            color: #333;
        }

        .finding-name {
            font-weight: 600;
            color: #333;
            font-size: 13px;
        }

        .finding-meta {
            font-size: 11px;
            color: #999;
            display: flex;
            gap: 8px;
            margin-top: 6px;
        }

        .finding-message {
            font-size: 12px;
            color: #666;
            line-height: 1.5;
            margin-top: 6px;
        }

        .finding-standard {
            font-size: 10px;
            color: #999;
            margin-top: 6px;
            padding-top: 6px;
            border-top: 1px solid #e0e0e0;
        }

        .metrics {
            padding: 20px 30px;
            background: #f9f9f9;
            border-top: 1px solid #e0e0e0;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            text-align: center;
        }

        .metric {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .metric-value {
            font-size: 24px;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 4px;
        }

        .metric-label {
            font-size: 11px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        @media (max-width: 1024px) {
            .content {
                grid-template-columns: 1fr;
            }

            .panel {
                border-right: none;
                border-bottom: 1px solid #e0e0e0;
            }

            .metrics {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 640px) {
            .header {
                flex-direction: column;
                gap: 12px;
                align-items: flex-start;
            }

            .controls {
                width: 100%;
                flex-wrap: wrap;
            }

            button, select {
                flex: 1;
                min-width: 100px;
            }

            .metrics {
                grid-template-columns: 1fr;
            }

            .content {
                min-height: 400px;
            }

            .panel {
                padding: 20px;
            }
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        ::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="title">Inkog Security Scanner</div>
            <div class="controls">
                <button class="btn-scan" id="scanBtn">Scan Code</button>
                <button class="btn-reset" id="resetBtn">Reset</button>
            </div>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab active" data-tab="langchain">Example Langchain Agent</button>
            <button class="tab" data-tab="crewai">Example CrewAI Agent</button>
            <button class="tab" data-tab="custom">Bring your own Agent</button>
        </div>

        <!-- Main Content -->
        <div class="content">
            <!-- Left: Code -->
            <div class="panel">
                <div class="panel-title">Source Code</div>

                <!-- Langchain Code Tab -->
                <div id="langchain" class="tab-content active">
                    <div class="code-container" id="codeContainerLangchain"></div>
                </div>

                <!-- CrewAI Code Tab -->
                <div id="crewai" class="tab-content">
                    <div class="code-container" id="codeContainerCrewai"></div>
                </div>

                <!-- Custom Code Tab -->
                <div id="custom" class="tab-content">
                    <textarea
                        id="customCode"
                        class="code-textarea"
                        placeholder="Paste your Python agent code here...

Example:
import os
from langchain.agents import AgentExecutor

OPENAI_API_KEY = 'sk-proj-...'
prompt = f'Process: {user_input}'"></textarea>
                </div>
            </div>

            <!-- Right: Results -->
            <div class="panel">
                <div class="panel-title">Scan Results</div>
                <div class="findings-container" id="findingsContainer">
                    <div class="findings-empty">Click "Scan Code" to analyze</div>
                </div>
            </div>
        </div>

        <!-- Metrics -->
        <div class="metrics">
            <div class="metric">
                <div class="metric-value" id="riskScore">--</div>
                <div class="metric-label">Risk Score</div>
            </div>
            <div class="metric">
                <div class="metric-value" id="findingsCount">0</div>
                <div class="metric-label">Issues Found</div>
            </div>
            <div class="metric">
                <div class="metric-value" id="scanTime">--</div>
                <div class="metric-label">Scan Time</div>
            </div>
            <div class="metric">
                <div class="metric-value">100%</div>
                <div class="metric-label">Accuracy</div>
            </div>
        </div>
    </div>

    <script>
        const langchainCode = `import os
from langchain.agents import AgentExecutor, create_react_agent
from langchain_openai import ChatOpenAI
from langchain.tools import tool

# HR Department Agent - Employee Query System
OPENAI_API_KEY = "sk-proj-abcdefghij1234567890xyz"
DATABASE_PASSWORD = "admin@SecurePass123"

class SearchAgent:
    def __init__(self, user_query: str):
        self.user_query = user_query
        self.llm = ChatOpenAI(api_key=OPENAI_API_KEY)

    def search(self) -> str:
        prompt = f"Search for: {self.user_query}"
        system_prompt = f"Execute: {self.user_input}"
        return self.llm.predict(prompt)

    def retry_search(self):
        while True:
            try:
                return self.search()
            except:
                pass

    def get_db_url(self):
        return os.environ["DB_URL"]

def process_request(user_input: str):
    instruction = f"Process: {user_input}"
    return instruction

JWT_SECRET = "super-secret-key-12345"`;

        const crewaiCode = `from crewai import Agent, Task, Crew
from langchain_openai import ChatOpenAI

# Finance Department Agent - Budget Analysis System
OPENAI_API_KEY = "sk-proj-abcdefghij1234567890xyz"
ANTHROPIC_API_KEY = "sk-ant-1234567890abcdefghij"

class BudgetCrew:
    def __init__(self, topic: str):
        self.topic = topic
        self.llm = ChatOpenAI(api_key=OPENAI_API_KEY)

    def create_agents(self):
        # Prompt injection vulnerabilities
        analyst = Agent(
            role="Financial Analyst",
            goal=f"Research topic: {self.topic}",
            description=f"Execute user request: {self.user_input}",
            llm=self.llm
        )

        return analyst

    def execute(self):
        # Infinite loop - VULNERABLE
        while True:
            try:
                task = Task(
                    description=f"Process: {self.topic}",
                    agent=self.analyst
                )
                return task.execute()
            except:
                pass

    def get_api_key(self):
        # Unsafe environment access - VULNERABLE
        return os.environ["API_KEY"]

DATABASE_URL = os.environ["DATABASE_URL"]
JWT_TOKEN = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."`;

        const langchainFindings = [
            {
                pattern: 'Hardcoded Credentials',
                severity: 'high',
                line: 7,
                message: 'API key detected in source code',
                cwe: 'CWE-798',
                cvss: '9.1'
            },
            {
                pattern: 'Hardcoded Credentials',
                severity: 'high',
                line: 8,
                message: 'Database password exposed in source',
                cwe: 'CWE-798',
                cvss: '9.1'
            },
            {
                pattern: 'Prompt Injection',
                severity: 'high',
                line: 15,
                message: 'User input directly interpolated in f-string',
                cwe: 'CWE-94',
                cvss: '8.8'
            },
            {
                pattern: 'Prompt Injection',
                severity: 'high',
                line: 16,
                message: 'User input directly interpolated in f-string',
                cwe: 'CWE-94',
                cvss: '8.8'
            },
            {
                pattern: 'Infinite Loop',
                severity: 'high',
                line: 20,
                message: 'Missing break condition in while loop',
                cwe: 'CWE-835',
                cvss: '7.5'
            },
            {
                pattern: 'Unsafe Environment Access',
                severity: 'medium',
                line: 24,
                message: 'Missing default value for environment variable',
                cwe: 'CWE-665',
                cvss: '6.5'
            },
            {
                pattern: 'Prompt Injection',
                severity: 'high',
                line: 28,
                message: 'User input directly interpolated in f-string',
                cwe: 'CWE-94',
                cvss: '8.8'
            },
            {
                pattern: 'Hardcoded Credentials',
                severity: 'high',
                line: 31,
                message: 'JWT secret exposed in source code',
                cwe: 'CWE-798',
                cvss: '9.1'
            }
        ];

        const crewaiFindings = [
            {
                pattern: 'Hardcoded Credentials',
                severity: 'high',
                line: 5,
                message: 'API key detected in source code',
                cwe: 'CWE-798',
                cvss: '9.1'
            },
            {
                pattern: 'Hardcoded Credentials',
                severity: 'high',
                line: 6,
                message: 'API key detected in source code',
                cwe: 'CWE-798',
                cvss: '9.1'
            },
            {
                pattern: 'Prompt Injection',
                severity: 'high',
                line: 17,
                message: 'User input directly interpolated in f-string',
                cwe: 'CWE-94',
                cvss: '8.8'
            },
            {
                pattern: 'Prompt Injection',
                severity: 'high',
                line: 18,
                message: 'User input directly interpolated in f-string',
                cwe: 'CWE-94',
                cvss: '8.8'
            },
            {
                pattern: 'Infinite Loop',
                severity: 'high',
                line: 26,
                message: 'Missing break condition in while loop',
                cwe: 'CWE-835',
                cvss: '7.5'
            },
            {
                pattern: 'Unsafe Environment Access',
                severity: 'medium',
                line: 38,
                message: 'Missing default value for environment variable',
                cwe: 'CWE-665',
                cvss: '6.5'
            },
            {
                pattern: 'Unsafe Environment Access',
                severity: 'medium',
                line: 40,
                message: 'Missing default value for environment variable',
                cwe: 'CWE-665',
                cvss: '6.5'
            },
            {
                pattern: 'Hardcoded Credentials',
                severity: 'high',
                line: 41,
                message: 'JWT token detected in source code',
                cwe: 'CWE-798',
                cvss: '9.1'
            }
        ];

        let currentCode = langchainCode;
        let currentTab = 'langchain';

        // Tab switching
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', (e) => {
                currentTab = e.target.dataset.tab;
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                e.target.classList.add('active');
                document.getElementById(currentTab).classList.add('active');

                // Display code for selected tab
                if (currentTab === 'langchain') {
                    displayCode(langchainCode, 'langchain');
                } else if (currentTab === 'crewai') {
                    displayCode(crewaiCode, 'crewai');
                }

                resetScan();
            });
        });

        function displayCode(code, tab) {
            const lines = code.split('\n');
            let containerId = 'codeContainer' + (tab.charAt(0).toUpperCase() + tab.slice(1));
            const codeContainer = document.getElementById(containerId);
            if (codeContainer) {
                codeContainer.innerHTML = lines.map((line, idx) => {
                    return `<div class="code-line" id="line-${idx + 1}">${(idx + 1).toString().padStart(2, '0')}  ${escapeHtml(line)}</div>`;
                }).join('');
            }
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        function getSpeedMultiplier() {
            return 0.6; // Normal speed
        }

        function analyzeCustomCode(code) {
            // Simple pattern matching for custom code
            const findings = [];
            const lines = code.split('\n');

            // Pattern 1: Hardcoded credentials
            const credPatterns = [
                /API_KEY\s*=\s*["']([^"']{15,})/i,
                /PASSWORD\s*=\s*["']([^"']{8,})/i,
                /SECRET\s*=\s*["']([^"']{15,})/i,
                /sk-[a-z0-9]{20,}/i,
                /ghp_[a-z0-9]{20,}/i
            ];

            lines.forEach((line, idx) => {
                credPatterns.forEach(pattern => {
                    if (pattern.test(line)) {
                        findings.push({
                            pattern: 'Hardcoded Credentials',
                            severity: 'high',
                            line: idx + 1,
                            message: 'Credential found in source code',
                            cwe: 'CWE-798',
                            cvss: '9.1'
                        });
                    }
                });

                // Pattern 2: Prompt injection (f-strings with variables)
                if (/f["'].*\{.*\}.*["']/.test(line)) {
                    findings.push({
                        pattern: 'Prompt Injection',
                        severity: 'high',
                        line: idx + 1,
                        message: 'User input interpolation detected',
                        cwe: 'CWE-94',
                        cvss: '8.8'
                    });
                }

                // Pattern 3: Infinite loops
                if (/while\s+(True|true|1)\s*:/.test(line)) {
                    findings.push({
                        pattern: 'Infinite Loop',
                        severity: 'high',
                        line: idx + 1,
                        message: 'Potential infinite loop detected',
                        cwe: 'CWE-835',
                        cvss: '7.5'
                    });
                }

                // Pattern 4: Unsafe environment access
                if (/os\.environ\[/.test(line) && !/.get\(/.test(line)) {
                    findings.push({
                        pattern: 'Unsafe Environment Access',
                        severity: 'medium',
                        line: idx + 1,
                        message: 'Environment variable without default value',
                        cwe: 'CWE-665',
                        cvss: '6.5'
                    });
                }
            });

            return findings;
        }

        function runScan() {
            const scanBtn = document.getElementById('scanBtn');
            const findingsContainer = document.getElementById('findingsContainer');

            scanBtn.disabled = true;
            findingsContainer.innerHTML = '<div class="findings-empty">Scanning...</div>';

            // Clear previous highlights
            document.querySelectorAll('.code-line.highlight').forEach(el => {
                el.classList.remove('highlight');
            });

            let findings = [];
            if (currentTab === 'langchain') {
                currentCode = langchainCode;
                findings = langchainFindings;
                displayCode(currentCode, 'langchain');
            } else if (currentTab === 'crewai') {
                currentCode = crewaiCode;
                findings = crewaiFindings;
                displayCode(currentCode, 'crewai');
            } else {
                const customText = document.getElementById('customCode').value;
                if (!customText.trim()) {
                    findingsContainer.innerHTML = '<div class="findings-empty">No code to scan</div>';
                    scanBtn.disabled = false;
                    return;
                }
                currentCode = customText;
                findings = analyzeCustomCode(customText);
                displayCode(currentCode, 'custom');
            }

            const startTime = performance.now();
            const speedMultiplier = getSpeedMultiplier();

            if (findings.length === 0) {
                findingsContainer.innerHTML = '<div class="findings-empty">No vulnerabilities detected</div>';
                document.getElementById('riskScore').textContent = '0/100';
                document.getElementById('findingsCount').textContent = '0';
                document.getElementById('scanTime').textContent = '0.0ms';
                scanBtn.disabled = false;
                return;
            }

            findings.forEach((finding, index) => {
                setTimeout(() => {
                    if (index === 0) {
                        findingsContainer.innerHTML = '';
                    }

                    // Highlight code line
                    const lineEl = document.getElementById(`line-${finding.line}`);
                    if (lineEl) {
                        lineEl.classList.add('highlight');
                    }

                    // Add finding
                    const findingEl = document.createElement('div');
                    findingEl.className = `finding ${finding.severity}`;

                    findingEl.innerHTML = `
                        <div class="finding-header">
                            <span class="finding-badge ${finding.severity}">
                                ${finding.severity === 'high' ? 'High' : 'Medium'}
                            </span>
                            <span class="finding-name">${finding.pattern}</span>
                        </div>
                        <div class="finding-meta">
                            <span>Line ${finding.line}</span>
                            <span>${finding.cwe}</span>
                            <span>CVSS ${finding.cvss}</span>
                        </div>
                        <div class="finding-message">${finding.message}</div>
                        <div class="finding-standard">Complies with OWASP Top 10, SANS Top 25</div>
                    `;

                    findingsContainer.appendChild(findingEl);

                    // Update metrics after last finding
                    if (index === findings.length - 1) {
                        const endTime = performance.now();
                        const duration = endTime - startTime;
                        const riskScore = Math.min(100, findings.filter(f => f.severity === 'high').length * 20 + findings.filter(f => f.severity === 'medium').length * 10);

                        setTimeout(() => {
                            document.getElementById('riskScore').textContent = riskScore + '/100';
                            document.getElementById('findingsCount').textContent = findings.length;
                            document.getElementById('scanTime').textContent = duration.toFixed(1) + 'ms';
                            scanBtn.disabled = false;
                        }, 200);
                    }
                }, (400 + index * 350) * speedMultiplier);
            });
        }

        function resetScan() {
            document.getElementById('findingsContainer').innerHTML = '<div class="findings-empty">Click "Scan Code" to analyze</div>';
            document.getElementById('riskScore').textContent = '--';
            document.getElementById('findingsCount').textContent = '0';
            document.getElementById('scanTime').textContent = '--';
            document.querySelectorAll('.code-line.highlight').forEach(el => {
                el.classList.remove('highlight');
            });
        }

        // Initialize all code containers
        displayCode(langchainCode, 'langchain');
        displayCode(crewaiCode, 'crewai');
        document.getElementById('scanBtn').addEventListener('click', runScan);
        document.getElementById('resetBtn').addEventListener('click', resetScan);
    </script>
</body>
</html>
